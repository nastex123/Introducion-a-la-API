<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXUS - Explorador DummyJSON</title>
  
  <!-- Importamos los iconos de Bootstrap -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  
  <!-- Enlazamos nuestro CSS personalizado -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Fondo atmosférico (Brillos rojos) -->
  <div class="bg-atmosphere"></div>

  <!-- HEADER (Efecto Cristal) -->
  <header>
    <div class="logo">
      <div class="logo-icon">
        <i class="bi bi-lightning-charge-fill"></i>
      </div>
      <span>NEXUS</span>
    </div>
    
    <nav id="mainNav">
      <button class="nav-link active" data-section="products">
        <i class="bi bi-box-seam"></i> Productos
      </button>
      <button class="nav-link" data-section="users">
        <i class="bi bi-people"></i> Usuarios
      </button>
      <button class="nav-link" data-section="posts">
        <i class="bi bi-pencil"></i> Posts
      </button>
      <button class="nav-link" data-section="quotes">
        <i class="bi bi-quote"></i> Citas
      </button>
    </nav>

    <button class="btn btn-outline" id="cartBtn" style="position: relative;">
      <i class="bi bi-bag"></i> Carrito
    </button>
  </header>

  <!-- MAIN CONTENT -->
  <main>
    
        <!-- Sección Productos (Visible por defecto) -->
    <section id="products" class="section active">
      <h2 class="section-title">Explorar Productos</h2>
      <p class="section-subtitle">Catálogo completo consumido de DummyJSON</p>
      
      <!-- Aquí se inyectarán las tarjetas dinámicamente -->
      <div id="productsGrid" class="products-grid"></div>
    </section>

    <!-- Sección Usuarios -->
    <section id="users" class="section">
      <h2 class="section-title">Directorio de Usuarios</h2>
      <p class="section-subtitle">Perfiles obtenidos de la API</p>
    </section>

    <!-- Sección Posts -->
    <section id="posts" class="section">
      <h2 class="section-title">Publicaciones Recientes</h2>
      <p class="section-subtitle">Posts de la comunidad</p>
    </section>

    <!-- Sección Citas -->
    <section id="quotes" class="section">
      <h2 class="section-title">Colección de Citas</h2>
      <p class="section-subtitle">Sabiduría e inspiración</p>
    </section>

  </main>

  <!-- Enlazamos nuestro JavaScript -->
  <script src="app.js"></script>
</body>
</html>
